resources:
  jobs:
    traffic_workflow:
      name: "[${bundle.target}] TransLink Traffic Demo Workflow"
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        # Task 1: Generate synthetic Vancouver traffic data
        - task_key: generate_synthetic_data
          notebook_task:
            notebook_path: ../src/data_gen/generate_traffic_data.py
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
              volume: "${var.volume}"
          environment_key: default

        # Task 2: Run the SDP pipeline (bronze → silver → gold MVs)
        - task_key: run_pipeline
          depends_on:
            - task_key: generate_synthetic_data
          pipeline_task:
            pipeline_id: ${resources.pipelines.traffic_pipeline.id}
            full_refresh: false

        # Task 3: Materialize gold MVs as physical Delta tables
        - task_key: materialize_gold_tables
          depends_on:
            - task_key: run_pipeline
          notebook_task:
            notebook_path: ../src/materialize/materialize_gold_tables.sql
            base_parameters:
              catalog: "${var.catalog}"
              schema: "${var.schema}"
            warehouse_id: ${resources.sql_warehouses.materialize_warehouse.id}

      permissions:
        - level: CAN_VIEW
          group_name: "users"
